<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Сайтоскролл · социальная лента сайтов</title>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #f5f5f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: 500px;
      margin: 0 auto;
      position: relative;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #121212;
      color: #eee;
    }
    body.dark .card, body.dark .modal, body.dark .action-btn, body.dark .add-button, body.dark .collection-item {
      background: #1e1e1e;
      border-color: #333;
      color: #eee;
    }
    body.dark .site-title a { color: #4da6ff; }
    body.dark .tag { background: #333; color: #ddd; }
    body.dark .input-group input, body.dark .input-group textarea {
      background: #2a2a2a;
      border-color: #444;
      color: white;
    }
    body.dark .modal { background: #1e1e1e; }
    body.dark .btn-secondary { background: #333; color: #eee; }
    body.dark .add-button { background: #0066ff; color: white; }
    
    /* Анимации */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes heartBeat {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .card {
      animation: fadeIn 0.3s ease-out;
    }
    .collection-item {
      animation: slideInUp 0.2s ease-out;
    }
    
    header {
      padding: 16px 16px 8px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #111;
    }
    body.dark h1 { color: #fff; }
    .subtitle {
      color: #666;
      font-size: 15px;
      margin-top: 4px;
    }
    body.dark .subtitle { color: #aaa; }
    
    .top-actions {
      display: flex;
      gap: 12px;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      border-radius: 30px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: transform 0.1s, background 0.2s;
    }
    .icon-btn:active { transform: scale(0.9); }
    body.dark .icon-btn { background: #2a2a2a; color: #eee; }
    
    .tabs {
      display: flex;
      padding: 0 16px;
      gap: 20px;
      border-bottom: 1px solid #ddd;
      margin-bottom: 8px;
    }
    body.dark .tabs { border-bottom-color: #444; }
    .tab {
      padding: 8px 0;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab.active {
      color: #0066ff;
      border-bottom-color: #0066ff;
    }
    body.dark .tab { color: #aaa; }
    body.dark .tab.active { color: #4da6ff; }
    
    .card-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      touch-action: pan-y;
    }
    .card {
      position: absolute;
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 6px 12px rgba(0,0,0,0.05);
      padding: 20px;
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1), box-shadow 0.2s;
      will-change: transform;
      border: 1px solid rgba(0,0,0,0.04);
      touch-action: none;
      user-select: none;
      cursor: grab;
      backdrop-filter: blur(2px);
    }
    .card:active { cursor: grabbing; box-shadow: 0 30px 50px rgba(0,0,0,0.15); }
    
    .site-preview {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 16px;
      position: relative;
    }
    .site-favicon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: transform 0.2s;
    }
    .site-favicon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .card:hover .site-favicon img { transform: scale(1.05); }
    .site-title h3 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .site-title a {
      color: #0066ff;
      text-decoration: none;
      font-size: 15px;
      word-break: break-all;
    }
    .site-description {
      color: #333;
      margin: 16px 0;
      line-height: 1.5;
      font-size: 16px;
    }
    body.dark .site-description { color: #ccc; }
    .site-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0 8px;
    }
    .tag {
      background: #f0f2f5;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 14px;
      color: #222;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tag:hover { background: #e0e4e8; transform: scale(0.97); }
    body.dark .tag:hover { background: #444; }
    
    .site-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      color: #888;
      font-size: 13px;
    }
    body.dark .site-meta { color: #aaa; }
    
    .delete-post-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.9);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #ff3b30;
      cursor: pointer;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: all 0.2s;
      z-index: 5;
    }
    .delete-post-btn:hover {
      background: #ff3b30;
      color: white;
      transform: scale(1.05);
    }
    body.dark .delete-post-btn { background: rgba(30,30,30,0.9); color: #ff6b6b; }
    body.dark .delete-post-btn:hover { background: #ff3b30; color: white; }
    
    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 16px 20px 24px;
      flex-shrink: 0;
    }
    .action-btn {
      width: 70px;
      height: 70px;
      border-radius: 40px;
      background: white;
      border: none;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      font-size: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      border: 1px solid #eee;
    }
    .action-btn:active { transform: scale(0.85); }
    .action-btn.skip { color: #ff3b30; }
    .action-btn.like { color: #34c759; }
    
    .add-button {
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 14px 20px;
      font-size: 17px;
      font-weight: 600;
      margin: 0 16px 12px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,102,255,0.25);
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .add-button:active { transform: scale(0.97); box-shadow: 0 4px 12px rgba(0,102,255,0.3); }
    
    /* Модалка */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: flex-end;
      z-index: 100;
      backdrop-filter: blur(3px);
    }
    .modal {
      background: white;
      width: 100%;
      max-width: 500px;
      border-radius: 28px 28px 0 0;
      padding: 24px 20px 30px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal h2 { margin-bottom: 20px; }
    .input-group { margin-bottom: 18px; }
    .input-group label { display: block; font-weight:500; margin-bottom:6px; }
    .input-group input, .input-group textarea {
      width: 100%; padding: 14px 16px; border: 1.5px solid #ddd;
      border-radius: 16px; font-size: 16px; background: #fafafa;
      transition: border 0.2s, box-shadow 0.2s;
    }
    .input-group input:focus, .input-group textarea:focus {
      border-color: #0066ff; outline: none; background: white;
      box-shadow: 0 0 0 3px rgba(0,102,255,0.1);
    }
    .input-group button {
      background: #f0f2f5; border: none; padding: 10px 16px;
      border-radius: 40px; font-size: 14px; cursor: pointer;
      margin-top: 8px; transition: background 0.2s;
    }
    .input-group button:hover { background: #e0e4e8; }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .modal-actions button { flex:1; padding:16px; border-radius:60px; border:none; font-weight:600; transition: transform 0.1s; }
    .modal-actions button:active { transform: scale(0.97); }
    .btn-primary { background:#0066ff; color:white; }
    .btn-secondary { background:#f0f0f0; color:#333; }
    
    .loading { text-align: center; padding: 20px; color: #666; }
    .empty-message { text-align: center; color: #666; font-size: 18px; padding: 40px; animation: fadeIn 0.3s; }
    body.dark .empty-message { color: #aaa; }
    
    /* Список лайков / профиль */
    .collection-list {
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }
    .collection-item {
      background: white;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #eee;
      transition: transform 0.15s;
    }
    .collection-item:active { transform: scale(0.99); }
    body.dark .collection-item {
      background: #1e1e1e;
      border-color: #333;
    }
    .collection-item img {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      object-fit: cover;
    }
    .collection-info { flex: 1; }
    .collection-info h4 { font-size: 18px; margin-bottom: 4px; }
    .collection-info a { color: #0066ff; font-size: 14px; }
    
    /* Кнопка входа/профиля */
    .auth-btn {
      background: #0066ff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .auth-btn:active { transform: scale(0.95); }
    .profile-header {
      padding: 16px;
      background: white;
      border-radius: 24px;
      margin: 8px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    body.dark .profile-header { background: #1e1e1e; }
    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 30px;
      background: #0066ff;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }
    
    /* Like heart animation */
    .heart-animation {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 100px;
      color: #ff3b30;
      pointer-events: none;
      z-index: 200;
      animation: heartBeat 0.4s ease-out forwards;
    }
  </style>
</head>
<body class="light">

<header>
  <div>
    <h1>📱 Сайтоскролл</h1>
    <div class="subtitle" id="statsSubtitle">Загрузка...</div>
  </div>
  <div class="top-actions">
    <button class="icon-btn" id="themeToggle" title="Тёмная тема">🌙</button>
    <button class="auth-btn" id="authBtn">Войти</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="discover">🔍 Открытия</div>
  <div class="tab" data-tab="liked">❤️ Мои лайки</div>
  <div class="tab" data-tab="profile">👤 Профиль</div>
</div>

<!-- Контейнеры -->
<div id="discoverContainer" style="display: flex; flex-direction: column; flex: 1;">
  <div class="card-area" id="cardArea">
    <div class="card" id="currentCard">
      <div class="loading">Загрузка сайтов...</div>
    </div>
  </div>
  <div class="action-buttons">
    <button class="action-btn skip" id="skipBtn" aria-label="Пропустить">✕</button>
    <button class="action-btn like" id="likeBtn" aria-label="Нравится и перейти">❤️</button>
  </div>
  <button class="add-button" id="showFormBtn">➕ Выложить новый сайт</button>
</div>

<div id="likedContainer" style="display: none; flex: 1; flex-direction: column;">
  <div class="collection-list" id="likedList"></div>
</div>

<div id="profileContainer" style="display: none; flex: 1; flex-direction: column; overflow-y: auto;">
  <div id="profileContent"></div>
</div>

<!-- Модалка добавления -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Добавить сайт</h2>
    <div class="input-group">
      <label>🔗 Ссылка на сайт</label>
      <input type="url" id="siteUrl" placeholder="https://example.com" required>
      <button id="fetchMetaBtn">✨ Заполнить автоматически</button>
    </div>
    <div class="input-group">
      <label>📸 URL картинки</label>
      <input type="url" id="siteImage" placeholder="https://... (скриншот или лого)">
    </div>
    <div class="input-group">
      <label>📝 Название</label>
      <input type="text" id="siteTitle" placeholder="Мой крутой сайт" required>
    </div>
    <div class="input-group">
      <label>📄 Описание</label>
      <textarea id="siteDesc" placeholder="О чём этот сайт?"></textarea>
    </div>
    <div class="input-group">
      <label>#️⃣ Теги (через запятую)</label>
      <input type="text" id="siteTags" placeholder="дизайн, новости, игры">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="cancelBtn">Отмена</button>
      <button class="btn-primary" id="saveBtn">Опубликовать</button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ========== КОНФИГУРАЦИЯ SUPABASE ==========
    // ЗАМЕНИТЕ НА СВОИ ДАННЫЕ
    const SUPABASE_URL = 'https://vkdaybztuugryugmbhku.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_G4gFPU_saTc6GL5lCEEOXg_fbvLAUDp';
    // ===========================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Состояние
    let allSites = [];
    let shuffledQueue = [];
    let currentIndex = 0;
    let activeFilterTag = null;
    let currentTab = 'discover';
    let currentUser = null;

    // Локальные хранилища
    const STORAGE_VIEWED = 'sitefeed_viewed';
    const STORAGE_LIKED = 'sitefeed_liked';

    function getViewedSet() {
      const str = localStorage.getItem(STORAGE_VIEWED);
      return str ? new Set(JSON.parse(str)) : new Set();
    }
    function saveViewedSet(set) { localStorage.setItem(STORAGE_VIEWED, JSON.stringify([...set])); }
    function getLikedSet() {
      const str = localStorage.getItem(STORAGE_LIKED);
      return str ? new Set(JSON.parse(str)) : new Set();
    }
    function saveLikedSet(set) { localStorage.setItem(STORAGE_LIKED, JSON.stringify([...set])); }

    // DOM элементы
    const cardEl = document.getElementById('currentCard');
    const skipBtn = document.getElementById('skipBtn');
    const likeBtn = document.getElementById('likeBtn');
    const discoverContainer = document.getElementById('discoverContainer');
    const likedContainer = document.getElementById('likedContainer');
    const profileContainer = document.getElementById('profileContainer');
    const likedList = document.getElementById('likedList');
    const profileContent = document.getElementById('profileContent');
    const statsSubtitle = document.getElementById('statsSubtitle');
    const themeToggle = document.getElementById('themeToggle');
    const authBtn = document.getElementById('authBtn');

    // Вспомогательные функции
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    function truncateUrl(url, maxLen=30) {
      if (!url) return '';
      try { const u = new URL(url); let host = u.hostname.replace(/^www\./, ''); if (host.length > maxLen) host = host.substring(0, maxLen-3)+'...'; return host; } 
      catch { return url; }
    }
    function formatTimeAgo(dateStr) {
      const date = new Date(dateStr);
      const diffSec = Math.floor((new Date() - date) / 1000);
      if (diffSec < 60) return 'только что';
      const diffMin = Math.floor(diffSec / 60);
      if (diffMin < 60) return `${diffMin} мин. назад`;
      const diffHours = Math.floor(diffMin / 60);
      if (diffHours < 24) return `${diffHours} ч. назад`;
      return date.toLocaleDateString('ru-RU');
    }
    function vibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }
    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getFilteredSites() {
      if (!activeFilterTag) return allSites;
      return allSites.filter(site => site.tags && site.tags.includes(activeFilterTag));
    }

    function rebuildQueue() {
      const filtered = getFilteredSites();
      if (filtered.length === 0) {
        shuffledQueue = [];
        currentIndex = 0;
        return;
      }
      shuffledQueue = shuffleArray(filtered);
      currentIndex = 0;
    }

    function getCurrentSite() {
      if (shuffledQueue.length === 0) return null;
      return shuffledQueue[currentIndex];
    }

    // Удаление id из localStorage при удалении поста
    function removeSiteFromLocal(siteId) {
      const viewed = getViewedSet();
      const liked = getLikedSet();
      viewed.delete(String(siteId));
      liked.delete(String(siteId));
      saveViewedSet(viewed);
      saveLikedSet(liked);
    }

    // Инкремент счётчиков с проверкой уникальности
    async function incrementCounter(siteId, field) {
      if (!siteId) return;
      const viewedSet = getViewedSet();
      const likedSet = getLikedSet();
      
      if (field === 'views') {
        if (viewedSet.has(String(siteId))) return;
        viewedSet.add(String(siteId));
        saveViewedSet(viewedSet);
      } else if (field === 'likes') {
        if (likedSet.has(String(siteId))) return;
        likedSet.add(String(siteId));
        saveLikedSet(likedSet);
      }
      
      const { data } = await supabase.from('sites').select(field).eq('id', siteId).single();
      const newValue = (data?.[field] || 0) + 1;
      await supabase.from('sites').update({ [field]: newValue }).eq('id', siteId);
      
      const site = allSites.find(s => s.id === siteId);
      if (site) site[field] = newValue;
    }

    // Загрузка сайтов
    async function loadSitesFromDB() {
      const { data, error } = await supabase.from('sites').select('*').order('created_at', { ascending: false });
      if (error) { console.error(error); return; }
      allSites = data || [];
      rebuildQueue();
      updateStatsSubtitle();
      renderCurrentView();
    }

    function updateStatsSubtitle() {
      const total = allSites.length;
      const likedCount = getLikedSet().size;
      statsSubtitle.textContent = `📊 ${total} сайтов · ❤️ ${likedCount} лайков`;
    }

    function renderCurrentCard() {
      const site = getCurrentSite();
      if (!site) {
        let msg = '😕 Пока нет сайтов';
        if (activeFilterTag) msg = `🔎 Нет сайтов с тегом #${activeFilterTag}`;
        cardEl.innerHTML = `<div class="empty-message">${msg}<br>Нажмите «Выложить», чтобы добавить первый!</div>`;
        return;
      }

      incrementCounter(site.id, 'views');

      const imageUrl = site.image || `https://www.google.com/s2/favicons?domain=${encodeURIComponent(site.url)}&sz=64`;
      const tagsHtml = site.tags && site.tags.length
        ? site.tags.map(t => `<span class="tag" data-tag="${escapeHtml(t)}">#${escapeHtml(t)}</span>`).join('')
        : '';
      
      const timeAgo = formatTimeAgo(site.created_at);
      const isLiked = getLikedSet().has(String(site.id));
      const isOwner = currentUser && site.user_id === currentUser.id;

      cardEl.innerHTML = `
        ${isOwner ? `<button class="delete-post-btn" data-id="${site.id}" title="Удалить пост">🗑️</button>` : ''}
        <div class="site-preview">
          <div class="site-favicon">
            <img src="${imageUrl}" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <span style="display:none; width:100%; height:100%; align-items:center; justify-content:center; background:#e0e0e0; color:#666; font-weight:bold; font-size:28px;">${escapeHtml(site.title?.charAt(0) || '?')}</span>
          </div>
          <div class="site-title">
            <h3>${escapeHtml(site.title) || 'Без названия'}</h3>
            <a href="${escapeHtml(site.url)}" target="_blank" rel="noopener">${escapeHtml(truncateUrl(site.url))}</a>
          </div>
        </div>
        ${site.description ? `<div class="site-description">${escapeHtml(site.description)}</div>` : ''}
        ${tagsHtml ? `<div class="site-tags">${tagsHtml}</div>` : ''}
        <div class="site-meta">
          <span>🕒 ${timeAgo}</span>
          <span>👀 ${site.views || 0} · ❤️ ${site.likes || 0} ${isLiked ? '✓' : ''}</span>
        </div>
      `;
      
      document.querySelectorAll('.tag').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          activeFilterTag = el.dataset.tag;
          rebuildQueue();
          renderCurrentCard();
        });
      });

      const delBtn = cardEl.querySelector('.delete-post-btn');
      if (delBtn) {
        delBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = delBtn.dataset.id;
          if (!confirm('Удалить этот пост?')) return;
          
          const { error } = await supabase.from('sites').delete().eq('id', id);
          if (error) { alert('Ошибка удаления'); return; }
          
          // Удаляем из локального массива и чистим localStorage
          allSites = allSites.filter(s => s.id != id);
          removeSiteFromLocal(id);
          
          rebuildQueue();
          updateStatsSubtitle();
          renderCurrentCard();
          if (currentTab === 'liked') renderLikedList();
          if (currentTab === 'profile') renderProfile();
        });
      }

      cardEl.style.transform = '';
      cardEl.style.transition = '';
    }

    function moveToNext(action) {
      const currentSite = getCurrentSite();
      if (!currentSite) return;

      if (action === 'like') {
        window.open(currentSite.url, '_blank');
        incrementCounter(currentSite.id, 'likes');
        vibrate(10);
        // Анимация сердца
        showHeartAnimation();
      } else if (action === 'skip') {
        incrementCounter(currentSite.id, 'skips');
        vibrate([5, 10, 5]);
      }

      if (shuffledQueue.length <= 1) {
        rebuildQueue();
      } else {
        if (currentIndex >= shuffledQueue.length - 1) rebuildQueue();
        else currentIndex++;
      }
      renderCurrentCard();
      updateStatsSubtitle();
    }

    function showHeartAnimation() {
      const heart = document.createElement('div');
      heart.className = 'heart-animation';
      heart.innerHTML = '❤️';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 400);
    }

    // Свайпы
    let startX=0, startY=0, currentX=0, currentY=0, isDragging=false;
    const SWIPE_THRESHOLD = 80;

    function onTouchStart(e) {
      if (!getCurrentSite()) return;
      const touch = e.touches[0];
      startX = touch.clientX; startY = touch.clientY;
      isDragging = true;
      cardEl.style.transition = 'none';
    }
    function onTouchMove(e) {
      if (!isDragging) return;
      const touch = e.touches[0];
      currentX = touch.clientX - startX;
      currentY = touch.clientY - startY;
      const rotate = currentX * 0.05;
      cardEl.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;
    }
    function onTouchEnd() {
      if (!isDragging) return;
      isDragging = false;
      cardEl.style.transition = 'transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1)';
      const diffX = currentX;
      if (Math.abs(diffX) > SWIPE_THRESHOLD) {
        if (diffX > 0) {
          cardEl.style.transform = `translateX(${window.innerWidth}px) rotate(15deg)`;
          setTimeout(() => moveToNext('like'), 200);
        } else {
          cardEl.style.transform = `translateX(-${window.innerWidth}px) rotate(-15deg)`;
          setTimeout(() => moveToNext('skip'), 200);
        }
      } else {
        cardEl.style.transform = '';
      }
      startX=startY=currentX=currentY=0;
    }
    cardEl.addEventListener('touchstart', onTouchStart, {passive: false});
    cardEl.addEventListener('touchmove', onTouchMove, {passive: false});
    cardEl.addEventListener('touchend', onTouchEnd);
    cardEl.addEventListener('touchcancel', () => {
      if (isDragging) { isDragging = false; cardEl.style.transition = 'transform 0.25s ease'; cardEl.style.transform = ''; }
    });

    skipBtn.addEventListener('click', () => getCurrentSite() && moveToNext('skip'));
    likeBtn.addEventListener('click', () => getCurrentSite() && moveToNext('like'));

    // Вкладки
    function switchTab(tabId) {
      currentTab = tabId;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
      
      discoverContainer.style.display = tabId === 'discover' ? 'flex' : 'none';
      likedContainer.style.display = tabId === 'liked' ? 'flex' : 'none';
      profileContainer.style.display = tabId === 'profile' ? 'flex' : 'none';
      
      if (tabId === 'discover') renderCurrentCard();
      else if (tabId === 'liked') renderLikedList();
      else if (tabId === 'profile') renderProfile();
    }

    function renderLikedList() {
      const likedIds = getLikedSet();
      const likedSites = allSites.filter(s => likedIds.has(String(s.id)));
      if (likedSites.length === 0) {
        likedList.innerHTML = '<div class="empty-message">💔 Пока нет лайков<br>Свайпайте вправо на понравившихся сайтах</div>';
        return;
      }
      let html = '';
      likedSites.forEach(site => {
        const img = site.image || `https://www.google.com/s2/favicons?domain=${encodeURIComponent(site.url)}&sz=48`;
        html += `
          <div class="collection-item">
            <img src="${img}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23666%22 font-size=%2240%22%3E${site.title?.charAt(0) || '?'}%3C/text%3E%3C/svg%3E'">
            <div class="collection-info">
              <h4>${escapeHtml(site.title) || 'Без названия'}</h4>
              <a href="${escapeHtml(site.url)}" target="_blank">${truncateUrl(site.url)}</a>
            </div>
            <span>❤️ ${site.likes || 0}</span>
          </div>
        `;
      });
      likedList.innerHTML = html;
    }

    function renderProfile() {
      if (!currentUser) {
        profileContent.innerHTML = `<div class="empty-message">🔒 Войдите, чтобы видеть свой профиль</div>`;
        return;
      }
      const mySites = allSites.filter(s => s.user_id === currentUser.id);
      const totalLikes = mySites.reduce((sum, s) => sum + (s.likes || 0), 0);
      const html = `
        <div class="profile-header">
          <div class="avatar">${currentUser.email?.charAt(0).toUpperCase() || '?'}</div>
          <div>
            <h3>${currentUser.email}</h3>
            <p>📬 ${mySites.length} постов · ❤️ ${totalLikes} лайков</p>
          </div>
          <button class="auth-btn" id="logoutBtn" style="margin-left: auto;">Выйти</button>
        </div>
        <div class="collection-list">
          ${mySites.length === 0 ? '<div class="empty-message">Вы ещё не добавили ни одного сайта</div>' : ''}
          ${mySites.map(site => {
            const img = site.image || `https://www.google.com/s2/favicons?domain=${encodeURIComponent(site.url)}&sz=48`;
            return `
              <div class="collection-item">
                <img src="${img}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23666%22 font-size=%2240%22%3E${site.title?.charAt(0) || '?'}%3C/text%3E%3C/svg%3E'">
                <div class="collection-info">
                  <h4>${escapeHtml(site.title) || 'Без названия'}</h4>
                  <a href="${escapeHtml(site.url)}" target="_blank">${truncateUrl(site.url)}</a>
                </div>
                <span>👀 ${site.views || 0} · ❤️ ${site.likes || 0}</span>
              </div>
            `;
          }).join('')}
        </div>
      `;
      profileContent.innerHTML = html;
      document.getElementById('logoutBtn')?.addEventListener('click', logout);
    }

    // Авторизация
    async function checkUser() {
      const { data: { user } } = await supabase.auth.getUser();
      currentUser = user;
      authBtn.textContent = user ? 'Профиль' : 'Войти';
      if (user) {
        await loadSitesFromDB();
      } else {
        // Гостевой режим: показываем все сайты, но без возможности добавления/удаления
        await loadSitesFromDB();
      }
      renderCurrentView();
    }

    async function login() {
      const email = prompt('Введите email для входа (будет отправлена ссылка)');
      if (!email) return;
      const { error } = await supabase.auth.signInWithOtp({ email });
      if (error) alert('Ошибка: ' + error.message);
      else alert('Проверьте почту! Ссылка для входа отправлена.');
    }

    async function logout() {
      await supabase.auth.signOut();
      currentUser = null;
      authBtn.textContent = 'Войти';
      switchTab('discover');
      renderCurrentView();
    }

    authBtn.addEventListener('click', () => {
      if (currentUser) {
        switchTab('profile');
      } else {
        login();
      }
    });

    // Добавление сайта (только для авторизованных)
    const modalOverlay = document.getElementById('modalOverlay');
    const showFormBtn = document.getElementById('showFormBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const saveBtn = document.getElementById('saveBtn');
    const fetchMetaBtn = document.getElementById('fetchMetaBtn');
    const urlInput = document.getElementById('siteUrl');
    const imageInput = document.getElementById('siteImage');
    const titleInput = document.getElementById('siteTitle');
    const descInput = document.getElementById('siteDesc');
    const tagsInput = document.getElementById('siteTags');

    function openModal() {
      if (!currentUser) {
        alert('Войдите, чтобы добавлять сайты');
        login();
        return;
      }
      modalOverlay.style.display = 'flex';
      urlInput.value = ''; imageInput.value = ''; titleInput.value = ''; descInput.value = ''; tagsInput.value = '';
    }
    function closeModal() { modalOverlay.style.display = 'none'; }
    showFormBtn.addEventListener('click', openModal);
    cancelBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

    fetchMetaBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      if (!url) { alert('Введите ссылку'); return; }
      fetchMetaBtn.textContent = '⏳ Загрузка...';
      fetchMetaBtn.disabled = true;
      try {
        const resp = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`);
        const json = await resp.json();
        if (json.status === 'success' && json.data) {
          const d = json.data;
          if (!titleInput.value) titleInput.value = d.title || '';
          if (!descInput.value) descInput.value = d.description || '';
          if (!imageInput.value) imageInput.value = d.image?.url || d.logo?.url || '';
        } else alert('Не удалось получить данные');
      } catch { alert('Ошибка соединения'); }
      finally { fetchMetaBtn.textContent = '✨ Заполнить автоматически'; fetchMetaBtn.disabled = false; }
    });

    saveBtn.addEventListener('click', async () => {
      if (!currentUser) { alert('Войдите'); return; }
      const url = urlInput.value.trim();
      if (!url) { alert('Введите ссылку'); return; }
      try { new URL(url); } catch { alert('Некорректный URL'); return; }
      const title = titleInput.value.trim() || 'Без названия';
      const description = descInput.value.trim();
      const image = imageInput.value.trim();
      let tags = tagsInput.value.trim() ? tagsInput.value.split(',').map(t => t.trim()).filter(t => t) : [];

      const newSite = { 
        url, title, description, image, tags, 
        user_id: currentUser.id,
        views:0, likes:0, skips:0 
      };
      const { data, error } = await supabase.from('sites').insert([newSite]).select();
      if (error) { alert('Ошибка: '+error.message); return; }
      if (data) {
        allSites.push(data[0]);
        rebuildQueue();
        if (currentTab === 'discover' && !getCurrentSite()) renderCurrentCard();
        updateStatsSubtitle();
      }
      closeModal();
    });

    // Тёмная тема
    function setTheme(isDark) {
      document.body.classList.toggle('dark', isDark);
      themeToggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    themeToggle.addEventListener('click', () => setTheme(!document.body.classList.contains('dark')));
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') setTheme(true);

    // Обработчики вкладок
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });

    // Вспомогательная функция для рендера текущего вида
    function renderCurrentView() {
      if (currentTab === 'discover') renderCurrentCard();
      else if (currentTab === 'liked') renderLikedList();
      else if (currentTab === 'profile') renderProfile();
    }

    // Инициализация
    checkUser();
    switchTab('discover');
  })();
</script>
</body>
</html>
